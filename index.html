<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Tracker — Debruhl Analytics</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M3 3h18v4H3V3zm0 6h12v2H3V9zm0 4h18v2H3v-2zm0 4h10v2H3v-2z"/></svg>
        </div>
        <div>
          <div class="login-logo-name">Research Tracker</div>
          <div class="login-logo-sub">Debruhl Analytics · Research</div>
        </div>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to access your projects, Gantt charts, and research budget — from any device.</p>

      <button class="btn btn-github" id="loginBtn" onclick="signIn()">
        <svg viewBox="0 0 24 24" width="19" height="19"><path fill="white" d="M12 .3a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm3.1 4.6c.9 0 1.8.4 2.4 1l.5 1c0 .5 0 .9-.2 1.4-.3 1.4-1.6 2.4-3 2.4l-.5-.1c-.3-.3-.2-.7 0-.9l.4-.6c.2-.6.1-1.1-.3-1.4-.4-.3-1-.2-1.2.2l-.3.7c-.2.3-.5.4-.9.3l-.4-.5c-.2-.7-.3-1.4-.1-2.2.4-1.5 1.9-2.5 3.5-2.3h.1zm-7.4.6c.5 0 1 .1 1.4.3.4.4.6 1 .4 1.5l-.2.6c-.2.4-.1.8.2 1.1.3.3.8.3 1.1 0l.5-.5c.2-.3.6-.4.9-.2.2.1.3.4.4.5.3.8.4 1.5.2 2.3-.4 1.6-2 2.7-3.7 2.4-2-.2-3.3-1.9-3-3.9.2-1.8 1.6-3.1 3.4-3.1h.4zm4.7 14.5c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/></svg>
        Sign in with GitHub
      </button>

      <div id="loginError" style="display:none;margin-top:12px;padding:9px 13px;background:#fef2f2;color:#b91c1c;border-radius:8px;font-size:13px;"></div>

      <p style="margin-top:20px;font-size:12px;color:#80868b;text-align:center;">
        <a href="https://brandondebruhl.org" target="_blank" style="color:#80868b;">brandondebruhl.org</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

    // Already signed in → go straight to app
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'app.html';
    });

    async function signIn() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Redirecting to GitHub…';
      const { error } = await db.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: 'https://bdebruh.github.io/Planner/app.html' }
      });
      if (error) {
        document.getElementById('loginError').style.display = '';
        document.getElementById('loginError').textContent = error.message;
        btn.disabled = false; btn.textContent = 'Sign in with GitHub';
      }
    }
  </script>
</body>
</html>
