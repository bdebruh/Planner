<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Tracker</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- Top nav -->
  <nav class="topnav">
    <a class="nav-logo" href="app.html">
      <div class="nav-logo-mark"><svg viewBox="0 0 24 24"><path d="M3 3h18v4H3V3zm0 6h12v2H3V9zm0 4h18v2H3v-2zm0 4h10v2H3v-2z"/></svg></div>
      <span class="nav-logo-text">Research <span>Tracker</span></span>
    </a>
    <div class="nav-spacer"></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('projects')" id="tab-projects">Projects</button>
      <button class="nav-tab" onclick="showView('budget')" id="tab-budget">Budget</button>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <span id="navName" style="font-size:13px;color:#5f6368;"></span>
      <div class="nav-avatar" id="navAvatar" onclick="signOut()" title="Sign out">?</div>
    </div>
  </nav>

  <!-- Main content area — no sidebar -->
  <div class="main-content" id="mainContent"></div>

  <!-- Toast container -->
  <div class="toast-wrap" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/gantt.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/projects.js"></script>
  <script>
    let currentUser    = null;
    let currentProjectId = null;
    let currentView    = 'projects';

    async function init() {
      const { data: { session } } = await DB.client.auth.getSession();
      if (!session) {
        // Preserve join token through login
        const join = new URLSearchParams(window.location.search).get('join');
        if (join) localStorage.setItem('pending_join', join);
        window.location.href = 'index.html'; return;
      }
      currentUser = session.user;

      // Handle pending invite link
      const pendingJoin = localStorage.getItem('pending_join')
        || new URLSearchParams(window.location.search).get('join');
      if (pendingJoin) {
        localStorage.removeItem('pending_join');
        try {
          const token = await DB.redeemShareToken(pendingJoin);
          toast(`You now have access to this project!`, 'success');
          // Remove ?join= from URL cleanly
          history.replaceState({}, '', window.location.pathname);
          await new Promise(r => setTimeout(r, 800));
          currentProjectId = token.project_id;
        } catch(e) {
          toast(e.message, 'error');
        }
      }

      const meta = session.user.user_metadata;
      const name = meta.full_name || meta.user_name || 'User';
      document.getElementById('navName').textContent = name;
      const avatar = document.getElementById('navAvatar');
      if (meta.avatar_url) {
        avatar.innerHTML = `<img src="${meta.avatar_url}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatar.textContent = name[0].toUpperCase();
      }

      showView('projects');
    }

    function showView(view, projectId) {
      currentView = view;
      if (projectId) currentProjectId = projectId;

      // Update nav tabs
      ['projects','budget'].forEach(t => {
        const el = document.getElementById('tab-' + t);
        if (el) el.classList.toggle('active', t === view);
      });

      // Gantt needs a fixed height so its internal scroll works
      const content = document.getElementById('mainContent');
      if (view === 'gantt') {
        content.style.height   = 'calc(100vh - 56px)';
        content.style.overflow = 'hidden';
      } else {
        content.style.height   = '';
        content.style.overflow = '';
      }

      if (view === 'projects')     Projects.render(content);
      else if (view === 'gantt')   Gantt.render(content, currentProjectId);
      else if (view === 'budget')  Budget.render(content);
    }

    function openProject(id) {
      currentProjectId = id;
      showView('gantt', id);
    }

    async function signOut() {
      if (!confirm('Sign out?')) return;
      await DB.client.auth.signOut();
      window.location.href = 'index.html';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast ' + type; el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    window.toast = toast;
    window.openProject = openProject;
    window.showView = showView;
    window.currentUser = () => currentUser;
    window.currentProjectId = () => currentProjectId;

    init();
  </script>
</body>
</html>
